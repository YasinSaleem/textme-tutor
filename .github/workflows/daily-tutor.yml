name: Daily SQL Tutor Cron

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 AM UTC (4:30 PM IST)
  workflow_dispatch:      # Allows triggering manually from the Actions tab

jobs:
  run-tutor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create empty .env file for command compatibility
        run: touch .env

      - name: Run Daily SQL Tutor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          USER_ID: ${{ secrets.USER_ID }}
        run: npm start
